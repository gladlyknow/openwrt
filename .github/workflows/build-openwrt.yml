#=================================================
# Description: Build OpenWrt for J1900 & Sync to CF R2
# Lisence: MIT
# Author: Gladly (gladly.wang)
#=================================================

name: Build OpenWrt For J1900

on:
  repository_dispatch:
  workflow_dispatch: # 支持在 GitHub Actions 后台手动点击按钮触发编译
  push:
    branches:
      - main # 当您改动代码推送到 main 分支时自动触发编译

env:
  REPO_URL: https://github.com/coolsnowwolf/lede # 使用最成熟、驱动极全的 Lean 源码
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检查分支代码
      uses: actions/checkout@main

    - name: 初始化虚拟机编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget \
        llvm python3-pyelftools libpython3-dev aria2 jq qemu-utils ccache rename \
        libelf-dev device-tree-compiler libgmp3-dev libmpc-dev libfuse-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "Asia/Shanghai"
        
        # 注入用户指定的专属 Git 签名印记
        git config --global user.email "github-actions[bot]@gladlyknow@gmail.com"
        git config --global user.name "github-actions[bot]@Gladly (gladly.wang)"

    - name: 克隆 OpenWrt / LEDE 源码
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: 自动注入第三方分流包软件源 (Passwall / SSR-plus)
      run: |
        cd openwrt
        # 注入最新官方纯净版 passwall 源码 feed 源
        echo "src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git;main" >> feeds.conf.default
        echo "src-git passwall_luci https://github.com/xiaorouji/openwrt-passwall.git;main" >> feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 自动生成 J1900 (x86_64) 主路由专属配置文件
      run: |
        cd openwrt
        # 1. 锁定目标架构为 x86_64 软路由平台
        echo "CONFIG_TARGET_x86=y" > .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config
        
        # 2. 核心：强制勾选主路由分流与加速软件包
        echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-passwall_Iptables_Transparent_Proxy=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-turboacc=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-ssr-plus=y" >> .config
        
        # 3. 补齐高颜值 Argon 主题以及常用工具
        echo "CONFIG_PACKAGE_luci-theme-argon=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
        echo "CONFIG_PACKAGE_nano=y" >> .config
        
        # 4. 自动推导并补全所有底层依赖关系
        make defconfig

    - name: 下载编译所需的特定源代码包
      id: package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 正在执行多线程高级交叉编译
      id: compile
      run: |
        cd openwrt
        echo -e "$(($(nproc)+1)) thread compile"
        # 优先使用多线程全速编译，如果报错会自动降为单线程并输出详细错误日志
        make -j$(($(nproc)+1)) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 整理编译生成的固件成品
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/x86/64
        # 清理多余的描述信息和基础 ipk，只保留核心刷机镜像
        rm -rf packages
        # 解决方案：改用标准 GITHUB_OUTPUT 传递路径，彻底解决 Context access 语法警告
        echo "firmware_path=$PWD" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 🚀 自动同步固件至 Cloudflare R2 存储桶
      uses: jakejarvis/s3-sync-action@master
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        args: --acl public-read
      env:
        # 1. 严格使用您指定的 Cloudflare 存储桶名称
        AWS_S3_BUCKET: 'aluminumos'
        # 2. 映射您在 GitHub Settings -> Secrets 里配置的两把安全钥匙
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
        # 3. 严格使用您指定的 R2 S3 API 端点地址
        AWS_S3_ENDPOINT: 'https://2fa0a0b26ad57eca148c4291fdb96f84.r2.cloudflarestorage.com'
        AWS_REGION: 'auto'
        # 4. 通过步骤输出精准捕获固件本地目录
        SOURCE_DIR: '${{ steps.organize.outputs.firmware_path }}'
